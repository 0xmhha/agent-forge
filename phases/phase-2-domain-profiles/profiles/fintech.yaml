# =============================================================================
# 금융 서비스 도메인 프로필 (Fintech)
# =============================================================================
# 규정 준수와 데이터 안전성이 최우선.
# 모든 변경에 감사 추적이 필요하고, 금융 데이터 처리에 엄격한 규칙을 적용한다.
# PCI DSS, SOX, 전자금융거래법 등 규제 준수를 전제로 한다.
# =============================================================================

metadata:
  domain: fintech
  version: "1.0"
  description: "금융 서비스 도메인 프로필 - 규정 준수와 데이터 안전성 최우선"
  author: "agent-forge"
  last_updated: "2026-03-10"

priority_matrix:
  safety: 0.9          # 금융 사고는 직접적 재산 피해로 이어짐
  compliance: 0.95     # 규제 위반은 사업 존속을 위협함
  performance: 0.6     # 응답 시간 중요하지만 정확성이 우선
  dev_speed: 0.3       # 속도보다 정확성, 빠른 배포는 위험
  maintainability: 0.7 # 장기 운영 시스템이므로 유지보수성 중요

convention_overrides:
  test_strategy: integration_first    # 시스템 간 금융 트랜잭션 흐름 검증이 핵심
  review_depth: all_severities        # 규제 환경에서는 사소한 문제도 감사 대상
  documentation_level: regulatory     # 감사 대응을 위한 규제 수준 문서화
  code_style: readability_first       # 감사관/규제 담당자가 이해할 수 있어야 함

domain_knowledge:
  terminology:
    - term: "transaction"
      meaning: "금융 거래 단위, 반드시 ACID 속성과 멱등성을 보장해야 함"
      constraints: "모든 트랜잭션에 고유 idempotency key 필수"
    - term: "ledger"
      meaning: "원장 - 모든 거래 기록의 불변 저장소"
      constraints: "append-only, 물리 삭제 절대 금지, soft delete만 허용"
    - term: "settlement"
      meaning: "정산 - 거래 완료 후 실제 자금 이동 (T+1 또는 T+2)"
      constraints: "정산 상태 머신은 역방향 전이 금지"
    - term: "reconciliation"
      meaning: "대사 - 내부 기록과 외부 시스템 기록의 일치 여부 검증"
      constraints: "일일 단위 자동 대사 + 불일치 시 즉시 알림"
    - term: "KYC"
      meaning: "Know Your Customer - 고객 신원 확인 절차"
      constraints: "인증 완료 전 금융 거래 기능 접근 차단"
    - term: "PII"
      meaning: "Personally Identifiable Information - 개인 식별 정보"
      constraints: "저장 시 암호화, 전송 시 TLS, 로그 출력 금지"

  forbidden_patterns:
    - id: floating_point_currency
      description: "통화 계산에 부동소수점(float/double) 사용 금지 - IEEE 754 정밀도 손실로 금액 오차 발생"
      severity: MUST
      alternative: "Decimal, BigDecimal, 또는 정수(센트/원 단위) 사용"
      detection_hint: "float|double 타입과 currency/amount/price 변수명 조합"

    - id: unencrypted_pii
      description: "PII(개인정보) 평문 저장 또는 평문 전송 금지 - 개인정보보호법 위반"
      severity: MUST
      alternative: "저장: AES-256-GCM 암호화, 전송: TLS 1.2+, 로그: 마스킹 처리"
      detection_hint: "email, phone, ssn, 주민번호 필드가 암호화 래퍼 없이 사용"

    - id: direct_db_mutation_without_audit
      description: "감사 로그 없는 직접 DB 상태 변경 금지 - SOX 규정 위반"
      severity: MUST
      alternative: "모든 상태 변경은 audit_log 테이블에 변경 전/후 값 기록"
      detection_hint: "UPDATE/DELETE 쿼리가 audit 로깅 호출 없이 실행"

    - id: unparameterized_queries
      description: "파라미터화되지 않은 SQL 쿼리 금지 - SQL 인젝션 위험"
      severity: MUST
      alternative: "Prepared Statement 또는 ORM의 파라미터 바인딩 사용"
      detection_hint: "문자열 연결(+, f-string, template literal)로 SQL 쿼리 구성"

    - id: silent_transaction_failure
      description: "트랜잭션 실패의 조용한 무시 금지 - 데이터 불일치로 자금 손실 가능"
      severity: MUST
      alternative: "실패 시 명시적 롤백 + 에러 로깅 + 알림 발송"
      detection_hint: "catch 블록에서 트랜잭션 에러를 로깅 없이 삼키는 코드"

    - id: hardcoded_financial_rules
      description: "비즈니스 규칙(수수료율, 한도, 환율) 하드코딩 금지 - 규제 변경 시 재배포 필요"
      severity: SHOULD
      alternative: "설정 서비스 또는 규칙 엔진에서 동적 로딩"
      detection_hint: "수수료, fee, rate, limit 관련 매직 넘버"

    - id: mutable_transaction_record
      description: "완료된 트랜잭션 레코드의 필드 수정 금지 - 원장 무결성 위반"
      severity: MUST
      alternative: "수정이 필요하면 reversal + 새 트랜잭션 생성 (보정 거래)"
      detection_hint: "completed/settled 상태 트랜잭션에 대한 UPDATE 쿼리"

    - id: logging_sensitive_data
      description: "로그에 민감 정보(카드번호, 비밀번호, 토큰) 출력 금지"
      severity: MUST
      alternative: "마스킹 유틸리티 적용 (예: **** **** **** 1234)"
      detection_hint: "log/print/console 호출에 card, password, token, secret 변수 포함"

  required_patterns:
    - id: audit_trail
      description: "모든 상태 변경 작업에 감사 로그 기록 필수 (who, what, when, before, after)"
      applies_to: "상태를 변경하는 모든 API 엔드포인트 및 서비스 메서드"
      verification: "상태 변경 함수 내에 audit logging 호출 존재 여부 확인"

    - id: idempotent_transactions
      description: "모든 금융 트랜잭션은 멱등성 보장 필수 - 네트워크 재시도로 인한 이중 처리 방지"
      applies_to: "결제, 이체, 정산 등 모든 금융 거래 API"
      verification: "idempotency key 파라미터 존재 + 중복 요청 감지 로직 확인"

    - id: regulatory_logging
      description: "규제 보고에 필요한 구조화된 로깅 필수 - 전자금융거래법 기록 보존 의무"
      applies_to: "금융 거래, 인증, 권한 변경 등 규제 대상 작업"
      verification: "structured logging 프레임워크 사용 + 필수 필드(timestamp, actor, action, result) 포함"

    - id: input_validation_boundary
      description: "모든 외부 입력에 대한 스키마 검증 필수 - 잘못된 금액, 계좌번호 등 방지"
      applies_to: "API 엔드포인트, 메시지 핸들러, 파일 파서"
      verification: "입력 스키마 정의(Zod, JSON Schema 등) + 핸들러 진입 시점에서 검증 호출"

    - id: graceful_degradation
      description: "외부 서비스 장애 시 안전한 폴백 처리 필수 - 결제 게이트웨이 타임아웃 등"
      applies_to: "외부 API 호출, 결제 게이트웨이, 환율 서비스 등 외부 의존성"
      verification: "circuit breaker 또는 retry + fallback 패턴 적용 여부 확인"

workflow:
  complexity_thresholds:
    micro_max_files: 1     # 금융에서는 단일 파일 변경도 신중하게 (거의 모든 것이 Standard)
    standard_max_files: 5  # 5개 파일 초과 시 Deep Review

  qr_settings:
    max_iterations: 5          # 규제 준수를 위해 충분한 반복 허용
    initial_blocking: all_severities  # 첫 리뷰부터 모든 심각도 차단

  automation_level: conservative  # 대부분의 결정에 인간 확인 필요
