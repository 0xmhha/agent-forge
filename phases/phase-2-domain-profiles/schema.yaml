# =============================================================================
# Domain Profile Schema Definition v1.0
# =============================================================================
# 도메인 프로필은 에이전트의 행동을 프로젝트 도메인에 맞게 커스터마이징한다.
# Convention Tier 1.5에 위치하며, Tier 1(사용자 명시 지시)에 의해서만 오버라이드된다.
#
# 이 파일은 프로필의 구조와 유효성 검증 규칙을 정의한다.
# 실제 프로필은 profiles/ 디렉토리에 작성한다.
# =============================================================================

# -----------------------------------------------------------------------------
# 메타데이터 (필수)
# 프로필을 식별하고 버전 관리하기 위한 기본 정보
# -----------------------------------------------------------------------------
metadata:
  # 도메인 식별자 (필수, 영문 소문자 + 하이픈)
  # 예: fintech, game-dev, healthcare, startup-mvp
  domain: string  # required, pattern: ^[a-z][a-z0-9-]*$

  # 프로필 버전 (필수, semver 형식)
  version: string  # required, pattern: ^\d+\.\d+$

  # 도메인 설명 (필수, 한 줄)
  description: string  # required

  # 프로필 작성자 (선택)
  author: string  # optional

  # 최종 수정일 (선택, ISO 8601)
  last_updated: string  # optional, pattern: ^\d{4}-\d{2}-\d{2}$

# -----------------------------------------------------------------------------
# 우선순위 매트릭스 (필수)
# 도메인에서 각 품질 속성의 상대적 중요도를 0.0~1.0 사이로 정의한다.
# 이 값은 QR 심각도 가중치 조정과 트레이드오프 판단에 사용된다.
#
# 가중치 해석:
#   0.0~0.2: 이 도메인에서 거의 무시해도 됨
#   0.3~0.5: 고려하되, 다른 속성과 충돌 시 양보
#   0.6~0.8: 중요함, 적극적으로 반영
#   0.9~1.0: 최우선, 다른 속성을 희생해서라도 보장
# -----------------------------------------------------------------------------
priority_matrix:
  # 안전성: 시스템 장애가 인명/재산에 미치는 영향
  # 높음 = 의료, 자동차, 항공 / 낮음 = 내부 도구
  safety: float  # required, range: 0.0~1.0

  # 규정 준수: 법적/규제 요구사항 충족 필요성
  # 높음 = 금융, 의료, 공공 / 낮음 = 개인 프로젝트
  compliance: float  # required, range: 0.0~1.0

  # 성능: 실행 속도, 메모리, 처리량 등 런타임 효율
  # 높음 = 게임, 임베디드, HFT / 낮음 = 관리자 도구
  performance: float  # required, range: 0.0~1.0

  # 개발 속도: 기능 출시까지의 시간 단축
  # 높음 = MVP, 프로토타입 / 낮음 = 미션 크리티컬
  dev_speed: float  # required, range: 0.0~1.0

  # 유지보수성: 장기적 코드 품질과 변경 용이성
  # 높음 = 장수 프로젝트, 대규모 팀 / 낮음 = 일회성 스크립트
  maintainability: float  # required, range: 0.0~1.0

# -----------------------------------------------------------------------------
# 규약 오버라이드 (필수)
# Tier 3 기본 규약을 도메인에 맞게 재정의한다.
# 여기서 정의하지 않은 항목은 Tier 3 기본값을 따른다.
# -----------------------------------------------------------------------------
convention_overrides:
  # 테스트 전략: 어떤 종류의 테스트를 우선할 것인가
  # - unit_first: 단위 테스트 우선 (순수 함수가 많은 라이브러리)
  # - integration_first: 통합 테스트 우선 (시스템 간 상호작용이 중요)
  # - e2e_first: E2E 테스트 우선 (사용자 시나리오가 핵심)
  # - property_based: 속성 기반 테스트 (수학적 불변성 검증)
  test_strategy: enum  # required, values: [unit_first, integration_first, e2e_first, property_based]

  # 리뷰 깊이: QR이 어떤 심각도까지 검사할 것인가
  # - must_only: MUST만 검사 (빠른 반복, MVP)
  # - must_should: MUST + SHOULD 검사 (일반적)
  # - all_severities: MUST + SHOULD + COULD 모두 검사 (규제 환경)
  review_depth: enum  # required, values: [must_only, must_should, all_severities]

  # 문서화 수준: 어느 정도의 문서를 요구하는가
  # - minimal: 핵심 API만 (MVP, 프로토타입)
  # - standard: 공개 인터페이스 + 아키텍처 결정 (일반)
  # - comprehensive: 모든 공개 함수 + 내부 로직 (대규모 팀)
  # - regulatory: 규제 요구 충족 수준 (감사 대응, 규정 준수)
  documentation_level: enum  # required, values: [minimal, standard, comprehensive, regulatory]

  # 코드 스타일 우선순위: 가독성과 성능이 충돌할 때
  # - readability_first: 명확한 변수명, 단순한 구조 우선
  # - performance_first: 인라인, 최적화된 자료구조 허용
  # - balanced: 상황에 따라 판단 (기본값)
  code_style: enum  # required, values: [readability_first, performance_first, balanced]

# -----------------------------------------------------------------------------
# 도메인 지식 (필수)
# 도메인 특화 용어, 금지 패턴, 필수 패턴을 정의한다.
# 에이전트가 도메인 맥락을 이해하고 적절한 리뷰를 수행하는 데 사용된다.
# -----------------------------------------------------------------------------
domain_knowledge:
  # 도메인 특화 용어집
  # 에이전트가 코드 리뷰 시 용어의 도메인 의미를 이해하도록 돕는다.
  terminology:
    - term: string       # required, 영문 용어
      meaning: string    # required, 도메인에서의 의미 (한국어 가능)
      constraints: string  # optional, 이 용어가 사용될 때 반드시 지켜야 할 제약

  # 금지 패턴: 이 도메인에서 절대 사용해서는 안 되는 패턴
  # 각 패턴은 QR에서 해당 severity로 자동 변환된다.
  # severity가 MUST인 금지 패턴은 QR MUST finding으로 보고된다.
  forbidden_patterns:
    - id: string           # required, 패턴 식별자 (snake_case)
      description: string  # required, 왜 금지되는지 설명
      severity: enum       # required, values: [MUST, SHOULD, COULD]
      alternative: string  # required, 대신 사용해야 할 방법
      detection_hint: string  # optional, 탐지를 위한 코드 패턴 힌트

  # 필수 패턴: 이 도메인에서 반드시 존재해야 하는 패턴
  # 해당 applies_to 범위의 코드에서 이 패턴이 없으면 QR finding으로 보고된다.
  required_patterns:
    - id: string           # required, 패턴 식별자 (snake_case)
      description: string  # required, 왜 필수인지 설명
      applies_to: string   # required, 적용 범위 (어떤 종류의 코드에 적용)
      verification: string  # optional, 패턴 존재 여부를 확인하는 방법

# -----------------------------------------------------------------------------
# 워크플로우 커스터마이징 (필수)
# 프로세스 모델의 동작을 도메인에 맞게 조정한다.
# -----------------------------------------------------------------------------
workflow:
  # 복잡도 분기 임계값 조정
  # Phase 1 프로세스 모델의 Micro/Standard/Deep 분류 기준을 재정의한다.
  # 금융 도메인에서는 작은 변경도 Standard로 처리해야 할 수 있다.
  complexity_thresholds:
    # Micro 태스크의 최대 파일 수 (이하이면 Micro)
    micro_max_files: integer  # required, range: 0~10, default: 3

    # Standard 태스크의 최대 파일 수 (이하이면 Standard, 초과하면 Deep)
    standard_max_files: integer  # required, range: 1~50, default: 10

  # QR(Quality Review) 설정
  qr_settings:
    # 최대 QR 반복 횟수 (무한 루프 방지)
    max_iterations: integer  # required, range: 1~10, default: 3

    # 첫 반복에서 차단할 심각도 수준
    # - all_severities: MUST + SHOULD + COULD 모두 차단
    # - must_should: MUST + SHOULD만 차단
    # - must_only: MUST만 차단
    initial_blocking: enum  # required, values: [all_severities, must_should, must_only]

  # 자동화 수준: 에이전트가 자율적으로 결정할 수 있는 범위
  # - conservative: 대부분의 결정에 인간 확인 요청 (규제 환경)
  # - moderate: 저위험 결정은 자율, 고위험은 확인 (일반)
  # - aggressive: 대부분의 결정을 자율 수행 (빠른 반복)
  automation_level: enum  # required, values: [conservative, moderate, aggressive]

# =============================================================================
# 유효성 검증 규칙
# =============================================================================
#
# 1. 필수 필드 (required):
#    - metadata.domain, metadata.version, metadata.description
#    - priority_matrix의 모든 5개 필드
#    - convention_overrides의 모든 4개 필드
#    - domain_knowledge.forbidden_patterns (최소 1개)
#    - domain_knowledge.required_patterns (최소 1개)
#    - workflow의 모든 필드
#
# 2. 값 범위:
#    - priority_matrix: 모든 값은 0.0 이상 1.0 이하
#    - complexity_thresholds.micro_max_files < standard_max_files
#    - qr_settings.max_iterations: 1 이상 10 이하
#
# 3. 참조 무결성:
#    - forbidden_patterns.severity는 QR severity와 동일한 값 사용
#    - convention_overrides의 enum 값은 정의된 값만 허용
#
# 4. 일관성 검증:
#    - priority_matrix에서 가장 높은 값이 convention_overrides와 모순되지 않아야 함
#      예: performance: 0.95인데 code_style: readability_first이면 경고
#    - automation_level: conservative인데 review_depth: must_only이면 경고
#
# 5. 네이밍 규칙:
#    - metadata.domain: 소문자 영문 + 하이픈 (^[a-z][a-z0-9-]*$)
#    - forbidden_patterns.id: snake_case (^[a-z][a-z0-9_]*$)
#    - required_patterns.id: snake_case (^[a-z][a-z0-9_]*$)
# =============================================================================
